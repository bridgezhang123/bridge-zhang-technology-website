# Project information
site_name: Bridge Between Engineers
site_url: https://www.bridgezhang.com/
site_author: Bridge Zhang
repo_url: https://github.com/bridgezhang123/bridge-zhang-technology-website
repo_name: bridgezhang123/bridge-zhang-technology-website
edit_uri: edit/main/docs/
site_description: >-
  Mechanical engineering notes, design insights, and practical knowledge — bridging theory and real-world engineering.
  机械工程笔记、设计见解与实践知识 —— 连接理论与真实工程的桥梁。

# Copyright
copyright: Copyright &copy; 2026-2026 Bridge Zhang

# Configuration
theme:
  name: material
  custom_dir: overrides
  logo: images/logo.png
  favicon: images/favicon.ico
  language: en
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tabs.link
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至亮色模式

plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
      enable_parallel_processing: false
      enable_git_follow: false
  - git-committers:
      enabled: !ENV [ENABLE_GIT_COMMITTERS, true]
      repository: bridgezhang123/bridge-zhang-technology-website
      branch: main
      docs_path: docs/
      token: !ENV [GITHUB_TOKEN, ""]

# Page tree
nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Site Guide: getting-started/site-guide.md
    - Learning Path: getting-started/learning-path.md
  - Design Insights/设计见解:
    - design/index.md
    - Design Philosophy: design/design-philosophy.md
    - Design Cases: design/design-cases.md
  - Modeling & Drawings:
    - modeling/index.md
    - CAD Modeling: modeling/cad-modeling.md
    - Drawing Standards: modeling/drawing-standards.md
    - Dimensioning: modeling/dimensioning.md
    - Naming Standards/命名标准: modeling/naming-standards.md
  - Manufacturing:
    - manufacturing/index.md
    - Machining Basics: manufacturing/machining-basics.md
    - Process Planning: manufacturing/process-planning.md
    - Surface Finish: manufacturing/surface-finish.md
  - Measurement:
    - measurement/index.md
    - Measurement Tools: measurement/tools.md
    - GD&T Inspection: measurement/gdt.md
    - Quality Control: measurement/quality-control.md
  - About/关于:
    - about/index.md
    - About Me/关于作者: about/author.md
    - About Site/关于站点: about/site.md
    - Building This Site/建站说明: about/site-building.md
    - Collaboration/协作说明: about/collaboration.md
    - Copyright & License/版权与许可: about/copyright-license.md
    - Acknowledgements/致谢: about/acknowledgements.md
    - Changelog/更新日志: about/changelog.md

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:zhangqiaohdu@outlook.com

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js
  - javascripts/home.js
  - javascripts/print-button.js
