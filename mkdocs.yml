# Project information
site_name: Bridge to Mechanics
site_url: https://www.bridgezhang.com/
site_author: Bridge Zhang
site_description: >-
  Mechanical engineering notes, design insights, and practical knowledge — bridging theory and real-world engineering.
  机械工程笔记、设计见解与实践知识 —— 连接理论与真实工程的桥梁。

# Copyright
copyright: Copyright &copy; 2026-2026 Bridge Zhang

# Configuration
theme:
  name: material
  custom_dir: overrides
  logo: images/logo.png
  favicon: images/favicon.ico
  language: en
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至亮色模式

plugins:
  - search:
      lang:
        - zh
        - en

# Page tree
nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Site Guide: getting-started/site-guide.md
    - Learning Path: getting-started/learning-path.md
  - Mechanical Notes: mechanical/index.md 
  - Design Insights:
    - design/index.md
    - Design Philosophy: design/design-philosophy.md
    - Design Cases: design/design-cases.md
  - Modeling & Drawings:
    - modeling/index.md
    - CAD Modeling: modeling/cad-modeling.md
    - Drawing Standards: modeling/drawing-standards.md
    - Dimensioning: modeling/dimensioning.md
    - Tolerances & Fits: modeling/tolerances.md
  - Manufacturing:
    - manufacturing/index.md
    - Machining Basics: manufacturing/machining-basics.md
    - Process Planning: manufacturing/process-planning.md
    - Surface Finish: manufacturing/surface-finish.md
  - Measurement & Inspection:
    - inspection/index.md
    - Measurement Tools: inspection/tools.md
    - GD&T Inspection: inspection/gdt.md
    - Quality Control: inspection/quality-control.md
  - About/关于:
    - about/index.md
    - About Me/关于作者: about/author.md
    - About Site/关于站点: about/site.md
    - Changelog/更新日志: about/changelog.md

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:bridge.zhang.123@gmail.com

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/home.js
